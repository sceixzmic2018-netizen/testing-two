<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Secret Video Message</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: "Poppins", sans-serif;
    height:100vh;
    overflow:hidden;
}

  /* Background image */
  #passwordPage {
    width: 100%;
    height: 100%;
    background: url('Login.png') no-repeat center center;
    background-size: contain;
    background-color: #ffd6f5;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
}

  

  /* Password box */
#passwordBox{
    position:absolute;
    top:58%;
    left:50%;
    transform:translate(-50%,-50%);

    width:320px;
    padding:25px 20px;

    background:rgba(255,245,248,0.92);   /* Pinkish white */
    border-radius:28px;
    box-shadow:0 10px 25px rgba(255,120,170,.25);
    backdrop-filter:blur(8px);
}

/* Password input */
#passwordInput{
    position:relative;
    display:block;
    margin:220px auto 0;      /* Auto center */

    width:230px;
    height:42px;

    background:#fff7fa;       /* Light pink */
    border:2px solid #ffb8d0;
    border-radius:22px;

    outline:none;
    text-align:center;

    font-size:22px;
    color:#d35f8d;
    font-weight:600;
}


#passwordInput::placeholder{
    color:transparent;
}

  button {
    position:absolute;

    left:42px;
    top:330px;

    width:200px;
    height:35px;

    background:transparent;

    border:none;

    color:transparent;

    cursor:pointer;
}
 

  #error {
    position:absolute;
    top:405px;
    width:100%;
    text-align:center;
    color:red;
    display:none;
    font-size:14px;
}

  /* Message (video) page */
  #messagePage {
    display: none;
    width: 100vw;
    height: 100vh;
    background: #000;
    align-items: center;
    justify-content: center;
  }

  #messagePage video {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .heart {
    position: absolute;
    color: rgba(255,0,100,0.3);
    font-size: 18px;
    animation: floatHearts 10s linear infinite;
    pointer-events: none;
  }
  @keyframes floatHearts {
    0% { transform: translateY(100vh) scale(1); opacity: 1; }
    100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
  }

  .petal { position: absolute; top: 0; left: 0; z-index: 3; pointer-events: none; }

/* Blur overlay */
#blurOverlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  backdrop-filter:blur(15px);
  -webkit-backdrop-filter:blur(15px);
  background:rgba(0,0,0,.35);
  z-index:9999;

  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
touch-action: none;

  color:#fff;
  text-align:center;
  font-family:Poppins,sans-serif;
}

#countdown{
    margin-top:25px;
    font-size:64px;
    font-weight:bold;
    font-family:monospace;
    letter-spacing:6px;
    color:#fff;
    text-shadow:0 0 15px rgba(255,255,255,.5);
}

#countdownLabel{
    margin-top:10px;
    font-size:16px;
    letter-spacing:6px;
    color:#fff;
    opacity:.9;
}

</style>
</head>
<body>

<div id="blurOverlay">
    <h2>👀 Curiosity detected!</h2>
    <p>You're a little early...</p>
    <p>Come back when the countdown reaches zero. ❤️</p>

    <div id="countdown">00:00:00</div>
    <div id="countdownLabel">HOURS&nbsp;&nbsp;&nbsp;MINUTES&nbsp;&nbsp;&nbsp;SECONDS</div>
</div>

<!-- PASSWORD PAGE -->
<div id="passwordPage">
  

  <!-- Password box -->
  <div id="passwordBox">
    <!-- Password title is already in image -->
    <input type="password" id="passwordInput" placeholder="">
    <button onclick="checkPassword()">OK</button>
    <p id="error">Mali 😭</p>
  </div>
</div>

<!-- MESSAGE PAGE -->
<div id="messagePage">
  <video id="secretVideo" playsinline controls>
    <source src="secret.mp4" type="video/mp4">
    Your browser does not support HTML5 video.
  </video>
</div>

<script>


// Password check
const correctPassword = "9302025";
function checkPassword() {
  const entered = document.getElementById("passwordInput").value;
  const error = document.getElementById("error");

  if (entered === correctPassword) {
    error.style.display = "none";
    centerExplosionPetals();
    setTimeout(() => {
      document.getElementById("passwordPage").style.display = "none";
      const msg = document.getElementById("messagePage");
      msg.style.display = "flex";
      createHearts();

      const video = document.getElementById("secretVideo");
      video.muted = false;
      video.play().catch(() => {
        video.muted = true;
        video.play();
      });
    }, 1200);
  } else {
    error.style.display = "block";
  }
}

// Hearts & petals logic
function createHearts() {
  for (let i = 0; i < 15; i++) {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = Math.random() * 20 + 10 + "px";
    heart.style.animationDuration = 5 + Math.random() * 5 + "s";
    heart.textContent = "❤️";
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 10000);
  }
  setTimeout(createHearts, 2000);
}

function centerExplosionPetals() {
  const emojis = ['🌹','💗','💖'];
  const centerX = window.innerWidth / 2;
  const centerY = window.innerHeight / 2;

  for (let i = 0; i < 100; i++) {
    const petal = document.createElement('div');
    petal.classList.add('petal');
    petal.style.left = centerX + 'px';
    petal.style.top = centerY + 'px';
    petal.style.fontSize = (20 + Math.random() * 25) + 'px';
    petal.style.opacity = 0.7 + Math.random() * 0.3;
    petal.textContent = emojis[Math.floor(Math.random() * emojis.length)];

    document.body.appendChild(petal);

    const angle = Math.random() * 2 * Math.PI;
    const distance = 400 + Math.random() * 200;
    const x = Math.cos(angle) * distance;
    const y = Math.sin(angle) * distance;
    const rotation = 720 * Math.random();

    petal.animate([
      { transform: 'translate(0, 0) rotate(0deg)', opacity: petal.style.opacity },
      { transform: `translate(${x}px, ${y}px) rotate(${rotation}deg)`, opacity: 0 }
    ], {
      duration: 2000,
      easing: 'ease-out',
      fill: 'forwards'
    });

    setTimeout(() => petal.remove(), 2000);
  }
}

</script>

<script>
function updateCountdown() {
    const unlock = new Date("2026-07-24T20:24:00").getTime();
    const now = Date.now();
    const diff = unlock - now;

    const overlay = document.getElementById("blurOverlay");
    const countdown = document.getElementById("countdown");

    if (diff <= 0) {
        overlay.style.display = "none";
        return;
    }

    const hours = Math.floor(diff / (1000 * 60 * 60));
    const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((diff % (1000 * 60)) / 1000);

    countdown.textContent =
        `${String(hours).padStart(2, '0')}:` +
        `${String(minutes).padStart(2, '0')}:` +
        `${String(seconds).padStart(2, '0')}`;
}

updateCountdown();
setInterval(updateCountdown, 1000);
</script>

</body>
</html>
